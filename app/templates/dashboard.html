<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
</head>
<body>
    <main>
        <p><a href="/">На главную</a> | <a href="/leads">Lead CRM</a></p>
        <h1>{{ page_title }}</h1>

        <section>
            <h2>Общие метрики</h2>
            <p><strong>Total leads:</strong> {{ total_leads }}</p>
        </section>

        <section>
            <h2>Лиды по статусам</h2>
            <table border="1" cellpadding="8" cellspacing="0">
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>Count</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in status_counts %}
                    <tr>
                        <td>{{ item.status }}</td>
                        <td>{{ item.count }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
